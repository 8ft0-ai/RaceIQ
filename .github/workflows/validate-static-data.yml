name: Validate static data

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-static-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Parse core JSON files
        run: |
          python -m json.tool data/grid_to_finish.json > /dev/null
          python -m json.tool data/grid_to_finish_validation.json > /dev/null
          if [ -f data/team_report_cards.json ]; then python -m json.tool data/team_report_cards.json > /dev/null; fi
          if [ -f data/team_report_cards_validation.json ]; then python -m json.tool data/team_report_cards_validation.json > /dev/null; fi

      - name: Run Team Report Card generator dry run
        run: python tools/generate_team_report_cards.py --dry-run

      - name: Generate Team Report Card outputs
        run: python tools/generate_team_report_cards.py

      - name: Validate generated static data
        run: python tools/validate_static_data.py

      - name: Run RaceIQ static app smoke validator
        run: python tools/validate_static_app.py

      - name: Capture Team Report Card generator diff
        if: always()
        run: |
          git diff --stat -- data/team_report_cards.json data/team_report_cards_validation.json | tee report-card-generator.diffstat
          git diff -- data/team_report_cards.json data/team_report_cards_validation.json > report-card-generator.diff || true

      - name: Upload Team Report Card generator diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-card-generator-diff
          path: |
            report-card-generator.diffstat
            report-card-generator.diff
          if-no-files-found: ignore

      - name: Verify Team Report Card generator reproduces committed output
        run: git diff --exit-code -- data/team_report_cards.json data/team_report_cards_validation.json
